services:
  # ── PHP-FPM (Symfony API) ────────────────────────────
  php:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    environment:
      APP_ENV: ${APP_ENV}
      APP_DEBUG: ${APP_DEBUG}
      APP_SECRET: ${APP_SECRET}
      APP_SHARE_DIR: ${APP_SHARE_DIR}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}?serverVersion=16
      MERCURE_URL: ${MERCURE_URL}
      MERCURE_PUBLIC_URL: ${MERCURE_PUBLIC_URL}
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET}
      DEFAULT_URI: ${BACKEND_URL}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
    volumes:
      - ./backend:/app
      - backend_uploads:/app/var/share
    networks:
      - app_network
    depends_on:
      database:
        condition: service_healthy

  # ── Nginx (reverse proxy → php-fpm) ─────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./backend/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/app/public:ro
    networks:
      - app_network
    depends_on:
      - php

  # ── Next.js Frontend ─────────────────────────────────
  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_MERCURE_URL: ${NEXT_PUBLIC_MERCURE_URL}
      API_URL_INTERNAL: http://nginx:80
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - app_network
    depends_on:
      - nginx

  # ── PostgreSQL ───────────────────────────────────────
  database:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Mercure Hub (real-time) ──────────────────────────
  mercure:
    image: dunglas/mercure
    ports:
      - "3001:80"
    environment:
      SERVER_NAME: ":80"
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_SECRET}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET}
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins ${CORS_ALLOW_ORIGIN}
        anonymous
        demo
    networks:
      - app_network

volumes:
  db_data:
  backend_uploads:
  frontend_node_modules:

networks:
  app_network:
    driver: bridge
