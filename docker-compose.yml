services:
  # ── PHP-FPM (Symfony API) ────────────────────────────
  php:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    restart: unless-stopped
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET}
      APP_SHARE_DIR: var/share
      DATABASE_URL: postgresql://${POSTGRES_USER:-draw}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB:-draw}?serverVersion=16
      MERCURE_URL: http://mercure/.well-known/mercure
      MERCURE_PUBLIC_URL: ${MERCURE_PUBLIC_URL}
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET}
      DEFAULT_URI: ${BACKEND_URL}
      CORS_ALLOW_ORIGIN: ${FRONTEND_URL}
    volumes:
      - backend_uploads:/app/var/share
      - backend_public:/app/public
    networks:
      - app_network
    depends_on:
      database:
        condition: service_healthy

  # ── Nginx (reverse proxy → php-fpm) ─────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./backend/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_public:/app/public:ro
    networks:
      - app_network
    depends_on:
      - php
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Next.js Frontend ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
      args:
        NEXT_PUBLIC_API_URL: ${BACKEND_URL}
        NEXT_PUBLIC_MERCURE_URL: ${MERCURE_PUBLIC_URL}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_URL_INTERNAL: http://nginx:80
    networks:
      - app_network
    depends_on:
      - nginx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── PostgreSQL ───────────────────────────────────────
  database:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-draw}
      POSTGRES_USER: ${POSTGRES_USER:-draw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-draw}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Mercure Hub (real-time) ──────────────────────────
  mercure:
    image: dunglas/mercure
    restart: unless-stopped
    environment:
      SERVER_NAME: ":80"
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_SECRET}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET}
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins ${FRONTEND_URL}
        anonymous
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  db_data:
  backend_uploads:
  backend_public:

networks:
  app_network:
    driver: bridge
